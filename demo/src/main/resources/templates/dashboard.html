<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Dashboard</title>
</head>
<body class="p-4">
    <div th:replace="~{fragments/navbar :: navbar}"></div>
    <div class="container">
    <h1>Dashboard</h1>
    <div class="row mt-4">
        <div class="col-md-4">
            <div class="card p-3">
                <h5>Patients</h5>
                <p th:text="${patientCount}"></p>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card p-3">
                <h5>Hearts</h5>
                <p th:text="${heartCount}"></p>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card p-3">
                <h5>Candidate Matches</h5>
                <p th:text="${candidateCount}"></p>
            </div>
        </div>
    </div>
</div>
</body>
</html>
