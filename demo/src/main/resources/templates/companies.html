<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Betriebe</title>
</head>
<body class="p-4">
    <div th:replace="~{fragments/navbar :: navbar}"></div>
  <div class="container">
    <h1>Betriebe (Companies)</h1>
    <form id="new-company" th:action="@{/companies}" method="post" th:object="${company}" class="mb-4">
        <div class="mb-3">
            <label class="form-label">Name</label>
            <input class="form-control" th:field="*{name}" />
        </div>
        <div class="mb-3">
            <label class="form-label">Email</label>
            <input class="form-control" th:field="*{email}" />
        </div>
        <button class="btn btn-primary" type="submit">Register</button>
    </form>

    <table class="table">
        <thead><tr><th>ID</th><th>Name</th><th>Email</th><th>Abos</th><th>Feed verwalten</th></tr></thead>
        <tbody>
        <tr th:each="c : ${companies}">
            <td th:text="${c.id}"></td>
            <td th:text="${c.name}"></td>
            <td th:text="${c.email}"></td>
            <td>
                <span class="badge text-bg-secondary me-1 mb-1" th:each="topic : ${c.subscriptions}" th:text="${topic.label}"></span>
                <span class="text-muted" th:if="${#lists.isEmpty(c.subscriptions)}">Keine Abos</span>
            </td>
            <td>
                <div class="d-flex flex-wrap gap-2">
                    <form th:each="topic : ${topics}" th:action="@{/companies/{id}/subscriptions/subscribe(id=${c.id})}" method="post" class="d-inline">
                        <input type="hidden" name="topic" th:value="${topic}" />
                        <button class="btn btn-sm btn-outline-primary" type="submit" th:text="${'Abo + ' + topic.label}"></button>
                    </form>
                    <form th:each="topic : ${topics}" th:action="@{/companies/{id}/subscriptions/unsubscribe(id=${c.id})}" method="post" class="d-inline">
                        <input type="hidden" name="topic" th:value="${topic}" />
                        <button class="btn btn-sm btn-outline-secondary" type="submit" th:text="${'Abo - ' + topic.label}"></button>
                    </form>
                </div>
            </td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
