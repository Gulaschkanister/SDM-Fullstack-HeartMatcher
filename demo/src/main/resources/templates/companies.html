<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <title th:text="#{page.companies.title}">Companies</title>
</head>
<body class="p-4">
    <div th:replace="~{fragments/navbar :: navbar}"></div>

    <div id="page-content" class="container" th:fragment="page-content">
        <h1 class="mb-4" th:text="#{page.companies.title}">Companies</h1>

        <form id="new-company"
              th:action="@{/companies}"
              method="post"
              th:object="${company}"
              class="mb-4"
              hx-post="/companies"
              hx-target="#page-content"
              hx-swap="outerHTML">
            <div class="mb-3">
                <label class="form-label" for="name" th:text="#{form.name}">Name</label>
                <input id="name" class="form-control" th:field="*{name}" />
            </div>
            <div class="mb-3">
                <label class="form-label" for="email" th:text="#{form.email}">Email</label>
                <input id="email" class="form-control" th:field="*{email}" />
            </div>
            <button class="btn btn-primary" type="submit" th:text="#{form.register}">Register</button>
        </form>

        <table class="table table-striped align-middle">
            <thead>
            <tr>
                <th th:text="#{table.id}">ID</th>
                <th th:text="#{form.name}">Name</th>
                <th th:text="#{form.email}">Email</th>
                <th th:text="#{table.abos}">Subscriptions</th>
                <th th:text="#{table.manageFeed}">Manage feed</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="c : ${companies}">
                <td th:text="${c.id}"></td>
                <td th:text="${c.name}"></td>
                <td th:text="${c.email}"></td>
                <td>
                    <span class="badge text-bg-secondary me-1 mb-1" th:each="topic : ${c.subscriptions}" th:text="${#messages.msg(topic.messageKey)}"></span>
                    <span class="text-muted" th:if="${#lists.isEmpty(c.subscriptions)}" th:text="#{table.noSubscriptions}">No subscriptions</span>
                </td>
                <td>
                    <div class="d-flex flex-wrap gap-2">
                        <form th:each="topic : ${topics}"
                              th:action="@{/companies/{id}/subscriptions/subscribe(id=${c.id})}"
                              method="post"
                              class="d-inline"
                            th:attr="hx-post=@{/companies/{id}/subscriptions/subscribe(id=${c.id})}"
                              hx-target="#page-content"
                              hx-swap="outerHTML">
                            <input type="hidden" name="topic" th:value="${topic}" />
                            <button class="btn btn-sm btn-outline-primary" type="submit" th:text="${'+' + #messages.msg(topic.messageKey)}"></button>
                        </form>
                        <form th:each="topic : ${topics}"
                              th:action="@{/companies/{id}/subscriptions/unsubscribe(id=${c.id})}"
                              method="post"
                              class="d-inline"
                            th:attr="hx-post=@{/companies/{id}/subscriptions/unsubscribe(id=${c.id})}"
                              hx-target="#page-content"
                              hx-swap="outerHTML">
                            <input type="hidden" name="topic" th:value="${topic}" />
                            <button class="btn btn-sm btn-outline-secondary" type="submit" th:text="${'-' + #messages.msg(topic.messageKey)}"></button>
                        </form>
                    </div>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</body>
</html>
