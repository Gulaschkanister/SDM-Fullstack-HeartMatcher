<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <title th:text="#{page.patients.title}">Patients</title>
</head>
<body class="p-4">
    <div th:replace="~{fragments/navbar :: navbar}"></div>

    <div id="page-content" class="container" th:fragment="page-content">
        <h1 class="mb-4" th:text="#{page.patients.title}">Patients</h1>

        <form id="new-patient"
              th:action="@{/patients}"
              method="post"
              th:object="${patient}"
              class="mb-4"
              hx-post="/patients"
              hx-target="#page-content"
              hx-swap="outerHTML">
            <div class="mb-3">
                <label class="form-label" for="name" th:text="#{form.name}">Name</label>
                <input id="name" class="form-control" th:field="*{name}" />
            </div>
            <div class="mb-3">
                <label class="form-label" for="bloodType" th:text="#{form.bloodType}">Blood Type</label>
                <input id="bloodType" class="form-control" th:field="*{bloodType}" />
            </div>
            <button class="btn btn-primary" type="submit" th:text="#{form.add}">Add</button>
        </form>

        <table class="table table-striped align-middle">
            <thead>
            <tr>
                <th th:text="#{table.id}">ID</th>
                <th th:text="#{form.name}">Name</th>
                <th th:text="#{form.bloodType}">Blood Type</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="p : ${patients}">
                <td th:text="${p.id}"></td>
                <td th:text="${p.name}"></td>
                <td th:text="${p.bloodType}"></td>
            </tr>
            </tbody>
        </table>
    </div>
</body>
</html>
