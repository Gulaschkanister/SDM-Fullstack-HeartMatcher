<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Hearts</title>
    </head>
<body class="p-4">
    <div th:replace="~{fragments/navbar :: navbar}"></div>
    <div class="container">
        <h1>Hearts</h1>
        <form id="new-heart" th:action="@{/hearts}" method="post" th:object="${heart}" class="mb-4">
        <div class="mb-3">
            <label class="form-label">Donor Name</label>
            <input class="form-control" th:field="*{donorName}" />
        </div>
        <div class="mb-3">
            <label class="form-label">Blood Type</label>
            <input class="form-control" th:field="*{bloodType}" />
        </div>
        <button class="btn btn-primary" type="submit">Add</button>
    </form>

    <table class="table">
        <thead><tr><th>ID</th><th>Donor</th><th>Blood Type</th></tr></thead>
        <tbody>
        <tr th:each="h : ${hearts}">
            <td th:text="${h.id}"></td>
            <td th:text="${h.donorName}"></td>
            <td th:text="${h.bloodType}"></td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
