<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <title th:text="#{page.dashboard.title}">Dashboard</title>
</head>
<body class="p-4">
    <div th:replace="~{fragments/navbar :: navbar}"></div>
    <div class="container">
        <h1 class="mb-4" th:text="#{page.dashboard.title}">Dashboard</h1>
        <div class="row mt-4">
            <div class="col-md-4">
                <div class="card p-3">
                    <h5 th:text="#{dashboard.patients}">Patients</h5>
                    <p class="fs-3 fw-semibold mb-0" th:text="${patientCount}"></p>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card p-3">
                    <h5 th:text="#{dashboard.hearts}">Hearts</h5>
                    <p class="fs-3 fw-semibold mb-0" th:text="${heartCount}"></p>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card p-3">
                    <h5 th:text="#{dashboard.candidates}">Candidate Matches</h5>
                    <p class="fs-3 fw-semibold mb-0" th:text="${candidateCount}"></p>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
