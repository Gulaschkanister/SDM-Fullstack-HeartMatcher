<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <title th:text="#{page.hearts.title}">Hearts</title>
</head>
<body class="p-4">
    <div th:replace="~{fragments/navbar :: navbar}"></div>

    <div id="page-content" class="container" th:fragment="page-content">
        <h1 class="mb-4" th:text="#{page.hearts.title}">Hearts</h1>

        <form id="new-heart"
              th:action="@{/hearts}"
              method="post"
              th:object="${heart}"
              class="mb-4"
              hx-post="/hearts"
              hx-target="#page-content"
              hx-swap="outerHTML">
            <div class="mb-3">
                <label class="form-label" for="donorName" th:text="#{form.donorName}">Donor Name</label>
                <input id="donorName" class="form-control" th:field="*{donorName}" />
            </div>
            <div class="mb-3">
                <label class="form-label" for="bloodType" th:text="#{form.bloodType}">Blood Type</label>
                <input id="bloodType" class="form-control" th:field="*{bloodType}" />
            </div>
            <button class="btn btn-primary" type="submit" th:text="#{form.add}">Add</button>
        </form>

        <table class="table table-striped align-middle">
            <thead>
            <tr>
                <th th:text="#{table.id}">ID</th>
                <th th:text="#{table.donor}">Donor</th>
                <th th:text="#{form.bloodType}">Blood Type</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="h : ${hearts}">
                <td th:text="${h.id}"></td>
                <td th:text="${h.donorName}"></td>
                <td th:text="${h.bloodType}"></td>
            </tr>
            </tbody>
        </table>
    </div>
</body>
</html>
